<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Chamada — Sociedade dos Guelfos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cinzel', 'Georgia', 'serif'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        gold: {
                            DEFAULT: '#D4AF37',
                            dim: '#b8922e',
                            glow: '#e8c547',
                        },
                    },
                    boxShadow: {
                        card: '0 12px 40px rgba(0,0,0,0.45)',
                    },
                },
            },
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen font-sans antialiased text-white">
    <div class="page-wrap flex min-h-screen flex-col items-center justify-start p-4 pb-10 sm:justify-center sm:p-6">
        
        <div class="w-full max-w-md space-y-4" role="main">
            
            <header class="px-2 text-center pt-4 sm:pt-0">
                <div class="flex items-center justify-center gap-2 sm:gap-3">
                    <h1 class="header-title font-serif text-[20px] leading-tight font-semibold uppercase tracking-[0.1em] text-gold xs:text-base sm:text-xl md:text-2xl whitespace-nowrap">
                        Sociedade dos Guelfos
                    </h1>
                </div>
                <p class="mt-2 font-sans text-[14px] font-medium uppercase tracking-[0.2em] text-gray-400 sm:text-xs">
                    Sistema de chamada
                </p>
            </header>

            <form id="form-chamada" class="space-y-4" novalidate>
                <input type="hidden" id="data" name="data" value="" />

                <div class="card-glass rounded-2xl border p-4 shadow-card sm:p-5">
                    <div class="flex gap-4">
                        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-lg border border-amber-600/40 bg-black/40 text-gold">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="4" width="18" height="18" rx="2" />
                                <path d="M16 2v4M8 2v4M3 10h18" />
                            </svg>
                        </div>
                        <div class="min-w-0 flex-1">
                            <p class="font-label-custom font-semibold uppercase tracking-widest text-gold">Encontro</p>
                            <p id="data-display" class="mt-1 font-sans text-base font-semibold leading-snug text-white sm:text-lg">
                                Carregando data...
                            </p>
                        </div>
                    </div>
                </div>

                <div class="card-glass rounded-2xl border p-4 shadow-card sm:p-5">
                    <div class="flex gap-4">
                        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-lg border border-amber-600/40 bg-black/40 text-gold">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z" />
                            </svg>
                        </div>
                        <div class="min-w-0 flex-1">
                            <label for="combo-aldeia" class="font-label-custom font-semibold uppercase tracking-widest text-gold">Aldeia</label>
                            <select id="combo-aldeia" class="mt-2 w-full cursor-pointer appearance-none rounded-xl border border-amber-600/50 bg-black/50 py-3 px-3 text-sm text-white focus:border-gold focus:outline-none">
                                <option value="">Selecione a aldeia</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="wrapper-sociedade" class="card-glass rounded-2xl border p-4 shadow-card sm:p-5 opacity-50 pointer-events-none transition-all">
                    <div class="flex gap-4">
                        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-lg border border-amber-600/40 bg-black/40 text-gold">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 014-4" />
                            </svg>
                        </div>
                        <div class="min-w-0 flex-1">
                            <label for="combo-sociedade" class="font-label-custom font-semibold uppercase tracking-widest text-gold">Sociedade</label>
                            <select id="combo-sociedade" class="mt-2 w-full cursor-pointer appearance-none rounded-xl border border-amber-600/50 bg-black/50 py-3 px-3 text-sm text-white focus:border-gold focus:outline-none">
                                <option value="">Selecione sociedade</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="card-membros" class="card-glass hidden-section rounded-2xl border p-4 shadow-card sm:p-5 transition-all duration-300">
                    <div class="flex gap-4 mb-4">
                        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-lg border border-amber-600/40 bg-black/40 text-gold">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
                            </svg>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <span class="font-label-custom font-semibold text-gold uppercase tracking-widest">Membros</span>
                                    <span id="badge-membros" class="rounded-full bg-emerald-600/90 px-2 py-0.5 text-[10px] font-semibold text-white">0</span>
                                </div>
                                <button type="button" id="btn-novo-membro" class="rounded-lg bg-gold px-3 py-1.5 text-[10px] font-bold text-black hover:bg-gold-glow">
                                    + NOVO
                                </button>
                            </div>
                            <input type="search" id="busca-membro" class="mt-2 w-full rounded-xl border border-white/10 bg-black/45 py-2 px-3 text-sm text-white placeholder:text-gray-500 outline-none" placeholder="BUSCAR..." />
                        </div>
                    </div>
                    
                    <div id="lista-membros-wrap" class="max-h-60 overflow-y-auto rounded-xl border border-white/5 bg-black/30">
                        <ul id="lista-membros" class="divide-y divide-white/5"></ul>
                        <p id="lista-membros-vazia" class="hidden px-4 py-6 text-center text-sm text-gray-500 uppercase">Nenhum membro cadastrado.</p>
                    </div>
                </div>

                <div class="card-glass rounded-2xl border p-4 shadow-card sm:p-5">
                    <div class="flex gap-4">
                        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-lg border border-amber-600/40 bg-black/40 text-gold">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                        </div>
                        <div class="min-w-0 flex-1">
                            <label for="email" class="font-label-custom font-semibold uppercase tracking-widest text-gold">E-mail para confirmação</label>
                            <input type="email" id="email" class="mt-2 w-full rounded-xl border border-amber-600/40 bg-black/50 px-4 py-3 text-sm text-white focus:border-gold outline-none" placeholder="seu@email.com" required />
                        </div>
                    </div>
                </div>

                <p id="msg-global" class="hidden rounded-2xl border px-4 py-3 text-sm font-sans"></p>

                <button type="submit" id="btn-submit" class="btn-submit-guelfo flex w-full items-center justify-center gap-2 rounded-2xl py-4 font-serif text-sm font-bold uppercase tracking-widest text-black shadow-lg disabled:opacity-50">
                    <span id="btn-label">Confirmar presença</span>
                </button>
            </form>
        </div>
    </div>

    <div id="modal-novo" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 p-4 backdrop-blur-sm">
        <div class="card-glass w-full max-w-sm rounded-2xl border border-gold/30 p-6 text-center">
            <h2 id="modal-titulo" class="font-serif text-gold uppercase text-lg">Novo Membro</h2>
            <p id="modal-info-aldeia" class="text-[10px] uppercase tracking-widest mb-4 text-gray-400">Carregando...</p>
            
            <div class="space-y-3">
                <input type="text" id="modal-nome" class="w-full rounded-xl border border-gold/40 bg-black/60 p-3 text-white focus:border-gold outline-none text-center uppercase" placeholder="NOME COMPLETO" />
            </div>
            
            <div class="flex gap-2 mt-6">
                <button type="button" id="modal-novo-fechar" class="flex-1 rounded-xl border border-white/20 py-3 text-xs text-white uppercase">Cancelar</button>
                <button type="button" id="modal-btn-cadastrar" class="flex-1 rounded-xl bg-gold py-3 text-xs font-bold text-black uppercase">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-aviso" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/40 p-4 backdrop-blur-sm">
        <div class="card-glass w-full max-w-xs rounded-2xl border border-red-500/50 p-6 text-center shadow-2xl">
            <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-red-900/30 text-red-500">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="mb-2 font-serif text-white uppercase tracking-wider">Membro já cadastrado</h3>
            <p id="aviso-texto" class="mb-6 text-xs text-gray-400 uppercase leading-relaxed"></p>
            <button type="button" id="btn-fechar-aviso" class="w-full rounded-xl bg-white/10 py-3 text-[10px] font-bold text-white hover:bg-white/20 uppercase transition-all">
                Entendido
            </button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
